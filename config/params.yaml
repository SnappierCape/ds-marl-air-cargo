# =============================================================================
# SIMULATION PARAMETERS CONFIG FILE
# =============================================================================
# DESCRIPTION:
#   This module stores all the parameters of the simulation in a centralized
#   way. Every other module imports this variables from here to allow
#   for centralized management.
# =============================================================================

# =============================================================================
# GHA DOCKS
# =============================================================================
ghas:
  dnata:
    total: 50
    import: 25
    export: 25
  klm:
    total: 48
    import: 24
    export: 24
  wfs:
    total: 30
    import: 15
    export: 15
  swiss:
    total: 28
    import: 14
    export: 14

# =============================================================================
# TP3
# =============================================================================
tp3:
  capacity: 140

# =============================================================================
# SERVICE TIME
# =============================================================================
service_time:
  export:
    mu: 3.5
    sigma: 0.4
    bounds: [11, 180]
  import:
    mu: 2.8
    sigma: 0.3
    bounds: [8, 120]

# =============================================================================
# ROAD NETWORK
# =============================================================================
road:
  sigma: 0.20
  lbound: 0.5
  ubound: 3
  segments:
    N0_N1: 2.0
    N0_N2: 2.0
    N0_N3: 1.0
    N0_N4: 3.0
    N0_N5: 5.0
    N1_N2: 0.5
    N1_N3: 2.0
    N1_N4: 4.0
    N1_N5: 6.0
    N2_N3: 2.0
    N2_N4: 4.0
    N2_N5: 6.0
    N3_N4: 2.0
    N3_N5: 4.0
    N4_N5: 2.0
  nodes:
    gate: "N0"
    tp3: "N1"
    dnata: "N2"
    klm: "N3"
    wfs: "N4"
    swiss: "N5"

# =============================================================================
# DEMAND MODEL
# =============================================================================
demand:
  arrival_rate: 0.5
  peak_multiplier: 4
  peak_window: [900, 1050]
  ramp_dur: 60
  flow_split:
    export: 0.60
    import: 0.40
  multi_stop_probs: [0.10, 0.30, 0.40, 0.20]
  origin_split:
    rfs: 0.25
    nl: 0.35
    forwarder: 0.30
    tp3: 0.10
  origin_travel_time:
    rfs: [15, 90]
    nl: [30, 180]
    forwarder: [20, 100]
    tp3: [0, 2]
  parcels_min: 5
  parcels_max: 50
  max_tp3_wait: 360

# =============================================================================
# MARL HYPERPARAMETERS
# =============================================================================
marl:
  step_min: 1
  alpha: 0.5
  gamma: 0.99
  reward_weights:
    parcel_on_time: 2.0
    wait_per_min: 0.05
    missed_slot: 10.0
    no_show: 5.0
    dock_util: 5.0
    queue_per_step: 0.1
    wpr_global: 1.0
    util_std: 0.5
    pending_trucks: 0.005
    slot_readiness: 0.05
  reward_scale: 0.01

# =============================================================================
# BOOKING RULES
# =============================================================================
dtp_rules:
  priority_window: 10
  slot_duration: 45
  lead_time: 4320
  freeze_time: 90