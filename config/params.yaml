# =============================================================================
# SIMULATION PARAMETERS CONFIG FILE
# =============================================================================
# DESCRIPTION:
#   This module stores all the parameters of the simulation in a centralized
#   way. Every other module imports this variables from here to allow
#   for centralized management.
# =============================================================================

# =============================================================================
# GHA DOCKS
# =============================================================================
gha:
  dnata:
    total: 50
    import: 25
    export: 25
  klm:
    total: 48
    import: 24
    export: 24
  swiss:
    total: 30
    import: 15
    export: 15
  wfs:
    total: 28
    import: 14
    export: 14

# =============================================================================
# TP3
# =============================================================================
tp3:
  capacity: 140

# =============================================================================
# SERVICE TIME
# =============================================================================
service_time:
  export:
    family: "uniform"
    params: {low: 15.0, high: 60.0}
  import:
    family: "uniform"
    params: {low: 10.0, high: 30.0}

# =============================================================================
# ROAD NETWORK
# =============================================================================
road:
  sigma: 0.20
  lbound: 0.5
  ubound: 3
  segments:
    N0_N1: 2.0
    N0_N2: 1.0
    N1_N2: 1.0
    N2_N3: 1.5
    N2_N4: 2.0
    N2_N5: 2.5 
    N2_N6: 1.0
  nodes:
    N0: "gate"
    N1: "tp3"
    N2: "cross"
    N3: "dnata"
    N4: "wfs"
    N5: "swiss"
    N6: "klm"

# =============================================================================
# DEMAND MODEL
# =============================================================================
demand:
  arrival_rate: 0.5    # truck per minute
  peak_multiplier: 4
  peak_window: [900, 1050]
  ramp_dur: 60
  flow_split:
    export: 0.60
    import: 0.40
  multi_stop_probs: [0.10, 0.30, 0.40, 0.20]
  origin_split:
    rfs: 0.25
    nl: 0.35
    forwarder: 0.30
    tp3: 0.10
  origin_travel_time:
    rfs: [15, 90]
    nl: [30, 180]
    forwarder: [20, 100]
    tp3: [0, 2]
  parcels_min: 5
  parcels_max: 50

# =============================================================================
# MARL HYPERPARAMETERS
# =============================================================================
marl:
  step_min: 1
  alpha: 0.5
  gamma: 0.99
  reward_weights:
    w_parcel_on_time: 2.0
    w_wait_per_min: 0.05
    w_missed_slot: 10.0
    w_no_show: 5.0
    w_dock_util: 5.0
    w_queue_per_step: 0.1
    w_wpr_global: 1.0
    w_util_std: 0.5

# =============================================================================
# BOOKING RULES
# =============================================================================
booking:
  priority_window: 10
  slot_duration: 45
  lead_time: 4320
  freeze_time: 90